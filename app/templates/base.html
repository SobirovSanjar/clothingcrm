<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}[[ app_name ]]{% endblock %} &middot; [[ app_name ]]</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">◆</span>
        <span class="brand-name">[[ app_name ]]</span>
      </div>
      <nav class="nav">
        <a href="/" class="nav-item {% if active == 'dashboard' %}is-active{% endif %}">Dashboard_nigga</a>
        <a href="/customers" class="nav-item {% if active == 'customers' %}is-active{% endif %}">Customers</a>
        <a href="/contacts" class="nav-item {% if active == 'contacts' %}is-active{% endif %}">Contacts</a>
        <a href="/leads" class="nav-item {% if active == 'leads' %}is-active{% endif %}">Pipeline</a>
        <a href="/products" class="nav-item {% if active == 'products' %}is-active{% endif %}">Products</a>
        <a href="/orders" class="nav-item {% if active == 'orders' %}is-active{% endif %}">Orders</a>
        <a href="/activities" class="nav-item {% if active == 'activities' %}is-active{% endif %}">Activities</a>
      </nav>
      <div class="sidebar-footer">
        <a class="nav-sub" href="/docs">REST API docs</a>
      </div>
    </aside>
    <div class="main">
      <header class="topbar">
        <div class="topbar-title">{% block heading %}{% endblock %}</div>
        <div class="topbar-user">
          {% if user %}
            <span class="user-name">[[ user.full_name ]]</span>
            <span class="user-role">[[ user.role ]]</span>
            <a class="btn btn-ghost btn-sm" href="/logout">Log out</a>
          {% endif %}
        </div>
      </header>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
</body>
</html>
