{% extends "base.html" %}
{% block title %}[[ 'Edit' if product else 'New' ]] product{% endblock %}
{% block heading %}[[ 'Edit product' if product else 'New product' ]]{% endblock %}
{% block content %}
<div class="panel" style="max-width: 680px;">
  <form class="form" method="post" action="[[ '/products/' ~ product.id ~ '/edit' if product else '/products/new' ]]">
    <div class="form-grid">
      <label class="field">
        <span>SKU *</span>
        <input type="text" name="sku" required value="[[ product.sku if product else '' ]]" />
      </label>
      <label class="field">
        <span>Category</span>
        <select name="category">
          {% for c in categories %}
          <option value="[[ c ]]" {% if product and product.category == c %}selected{% endif %}>[[ c ]]</option>
          {% endfor %}
        </select>
      </label>
      <label class="field col-span-2">
        <span>Name *</span>
        <input type="text" name="name" required value="[[ product.name if product else '' ]]" />
      </label>
      <label class="field">
        <span>Size</span>
        <input type="text" name="size" value="[[ product.size or '' if product else '' ]]" />
      </label>
      <label class="field">
        <span>Color</span>
        <input type="text" name="color" value="[[ product.color or '' if product else '' ]]" />
      </label>
      <label class="field">
        <span>Unit price</span>
        <input type="number" step="0.01" name="unit_price" value="[[ product.unit_price if product else '0' ]]" />
      </label>
      <label class="field">
        <span>Stock quantity</span>
        <input type="number" name="stock_qty" value="[[ product.stock_qty if product else '0' ]]" />
      </label>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">[[ 'Save changes' if product else 'Create product' ]]</button>
      <a class="btn" href="/products">Cancel</a>
      {% if product %}
      <form class="inline-form" method="post" action="/products/[[ product.id ]]/delete" onsubmit="return confirm('Delete this product?');">
        <button class="btn btn-danger" type="submit">Delete</button>
      </form>
      {% endif %}
    </div>
  </form>
</div>
{% endblock %}
