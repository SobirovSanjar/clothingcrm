<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in &middot; [[ app_name ]]</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-brand"><span class="brand-mark">◆</span> [[ app_name ]]</div>
    <p class="login-sub">Cloud CRM — ERP / CRM / WMS platform</p>
    {% if error %}<div class="alert alert-error">[[ error ]]</div>{% endif %}
    <form method="post" action="/login" class="form">
      <label class="field">
        <span>Email</span>
        <input type="email" name="email" required autofocus placeholder="admin@clothcrm.local" />
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" name="password" required placeholder="password" />
      </label>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>
    <p class="login-hint">Demo login: <code>admin@clothcrm.local</code> / <code>admin123</code></p>
  </div>
</body>
</html>
